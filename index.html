  { id:"e1", genre:"economy", importance:"high",

  { id:"e4", genre:"economy", importance:"medium",

// ── STATE & UTILS ───────────────────────────────────────────────
let activeGenres = new Set(GENRES.map(g=>g.id));
let selected = null;
let savedScroll = 0;
const root = document.getElementById("root");
const gInfo = id => GENRES.find(x => x.id === id) || GENRES[0];

// ── RENDER ──────────────────────────────────────────────────────
function render() {
  const filtered = NEWS.filter(a => activeGenres.has(a.genre));
  const tops = GENRES.filter(g => activeGenres.has(g.id))
    .map(g => NEWS.find(a => a.genre===g.id && a.importance==="high"))
    .filter(Boolean);
  const rest = filtered.filter(a => !tops.includes(a));

  const today = new Date().toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",weekday:"short"});

  if (selected) {
    renderDetail();
    return;
  }

  root.innerHTML = `
    <div id="list-view" style="display:flex;flex-direction:column;height:100dvh;background:#f7f6f2;font-family:'Georgia','Noto Serif JP',serif;max-width:430px;margin:0 auto;">
      <!-- HEADER -->
      <div style="background:#0f0e0b;padding-top:env(safe-area-inset-top,44px);flex-shrink:0;border-bottom:3px solid #c9a84c;">
        <div style="padding:14px 20px 10px;display:flex;justify-content:space-between;align-items:flex-end;">
          <div>
            <div style="font-size:9px;color:#c9a84c;letter-spacing:0.3em;margin-bottom:4px;font-family:'Courier New',monospace;">DAILY INTELLIGENCE</div>
            <div style="font-size:26px;font-weight:900;color:#f5f0e8;letter-spacing:-0.02em;line-height:1;">速読みNEWS</div>
          </div>
          <div style="text-align:right;font-size:10px;color:#8a7a60;font-family:'Courier New',monospace;line-height:1.6;">${today}<br>NHK · 日経 · Reuters</div>
        </div>
        <div style="padding:0 16px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;">
          <button onclick="toggleAll()" style="flex-shrink:0;padding:5px 12px;border-radius:4px;border:1px solid ${activeGenres.size===GENRES.length?'#c9a84c':'#3a3020'};background:${activeGenres.size===GENRES.length?'#c9a84c':'transparent'};color:${activeGenres.size===GENRES.length?'#000':'#6a5a40'};font-size:11px;font-weight:700;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:0.05em;">ALL</button>
          ${GENRES.map(g => `
            <button onclick="toggleGenre('${g.id}')" style="flex-shrink:0;padding:5px 12px;border-radius:4px;border:1px solid ${activeGenres.has(g.id)?g.color:'#2a2520'};background:${activeGenres.has(g.id)?g.color:'transparent'};color:${activeGenres.has(g.id)?'#fff':'#6a5a40'};font-size:11px;font-weight:700;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:0.05em;transition:all 0.15s;">${g.label}</button>
          `).join('')}
        </div>
      </div>

      <!-- SCROLL CONTENT -->
      <div id="scroll-content" style="flex:1;overflow-y:auto;background:#f7f6f2;scrollbar-width:none;">
        ${tops.length > 0 ? `
          <div style="padding:16px 16px 0;">
            <div style="font-size:9px;letter-spacing:0.3em;color:#9a8060;margin-bottom:10px;font-family:'Courier New',monospace;">◈ TOP STORIES</div>
            ${tops.map((a,i)=>renderTopCard(a,i)).join('')}
          </div>
        ` : ''}

        ${GENRES.filter(g=>activeGenres.has(g.id)).map(genre => {
          const articles = rest.filter(a=>a.genre===genre.id);
          if (!articles.length) return '';
          return `
            <div style="margin-top:24px;">
              <div style="padding:0 16px 8px;display:flex;align-items:center;gap:10px;">
                <div style="width:3px;height:16px;background:${genre.color};border-radius:2px;flex-shrink:0;"></div>
                <span style="font-size:10px;font-weight:700;color:${genre.color};letter-spacing:0.2em;font-family:'Courier New',monospace;">${genre.label.toUpperCase()}</span>
                <div style="flex:1;height:1px;background:#e0dbd0;"></div>
                <span style="font-size:9px;color:#b0a890;font-family:'Courier New',monospace;">${articles.length}</span>
              </div>
              ${articles.map((a,i)=>renderRow(a,i===articles.length-1)).join('')}
            </div>
          `;
        }).join('')}

        <div style="padding:28px 20px 16px;text-align:center;">
          <div style="font-size:9px;color:#c0b8a8;letter-spacing:0.15em;font-family:'Courier New',monospace;">${filtered.length} ARTICLES · NHK / 日経 / Bloomberg / Reuters</div>
        </div>
      </div>
    </div>
  `;

  // Restore scroll
  const sc = document.getElementById("scroll-content");
  if (sc) sc.scrollTop = savedScroll;
}

function renderTopCard(a, idx) {
  const genre = gInfo(a.genre);
  return `
    <div onclick="openDetail('${a.id}')" style="background:#fff;border:1px solid ${genre.color}22;border-left:4px solid ${genre.color};border-radius:2px;padding:16px 16px 14px;cursor:pointer;margin-bottom:${idx>0?'10px':'0'};animation:fadeIn 0.3s ${idx*60}ms both;" ontouchstart="this.style.opacity=0.85" ontouchend="this.style.opacity=1">
      <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
        <span style="font-size:9px;font-weight:700;color:${genre.color};letter-spacing:0.2em;font-family:'Courier New',monospace;">${genre.label}</span>
        <span style="font-size:9px;color:#b0a890;font-family:'Courier New',monospace;">· ${a.source}</span>
      </div>
      <div style="font-size:16px;font-weight:700;color:#1a1610;line-height:1.45;margin-bottom:8px;letter-spacing:-0.01em;">${a.title}</div>
      <div style="font-size:12px;color:#6a6050;line-height:1.6;margin-bottom:10px;">${a.summary[0]}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;gap:6px;">${a.tags.slice(0,2).map(t=>`<span style="font-size:9px;color:${genre.color};background:${genre.color}18;padding:2px 7px;border-radius:2px;font-family:'Courier New',monospace;">#${t}</span>`).join('')}</div>
        <span style="font-size:11px;color:${genre.color};font-weight:700;">要約を読む →</span>
      </div>
    </div>
  `;
}

function renderRow(a, isLast) {
  const genre = gInfo(a.genre);
  return `
    <div onclick="openDetail('${a.id}')" style="padding:12px 16px;border-bottom:${isLast?'none':'1px solid #ece7dc'};cursor:pointer;display:flex;gap:12px;align-items:flex-start;" ontouchstart="this.style.background='#f0ede5'" ontouchend="this.style.background='transparent'">
      <div style="width:3px;height:40px;background:${genre.color};border-radius:2px;flex-shrink:0;margin-top:2px;opacity:0.5;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:600;color:#1a1610;line-height:1.4;margin-bottom:4px;letter-spacing:-0.01em;">${a.title}</div>
        <div style="font-size:11px;color:#8a8070;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${a.summary[0]}</div>
      </div>
      <span style="font-size:14px;color:#c0b8a8;flex-shrink:0;margin-top:8px;">›</span>
    </div>
  `;
}

function renderDetail() {
  const a = selected;
  const genre = gInfo(a.genre);
  root.innerHTML = `
    <div style="position:fixed;inset:0;background:#f7f6f2;display:flex;flex-direction:column;z-index:200;overflow-y:auto;font-family:'Georgia','Noto Serif JP',serif;max-width:430px;margin:0 auto;animation:slideUp 0.25s ease;">
      <div style="background:${genre.color};padding-top:env(safe-area-inset-top,44px);flex-shrink:0;">
        <div style="padding:12px 16px 16px;">
          <button onclick="closeDetail()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:4px;padding:7px 14px;font-size:13px;cursor:pointer;margin-bottom:14px;font-family:inherit;">← 一覧へ戻る</button>
          <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
            <span style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.8);letter-spacing:0.2em;font-family:'Courier New',monospace;background:rgba(255,255,255,0.15);padding:3px 8px;border-radius:2px;">${genre.label}</span>
            <span style="font-size:9px;color:rgba(255,255,255,0.6);font-family:'Courier New',monospace;padding:3px 8px;">${a.source}</span>
          </div>
          <div style="font-size:18px;font-weight:700;color:#fff;line-height:1.45;letter-spacing:-0.01em;">${a.title}</div>
        </div>
      </div>
      <div style="flex:1;padding:20px 16px;">
        <div style="background:#fff;border-radius:2px;padding:18px;margin-bottom:16px;border:1px solid #e8e0d0;">
          <div style="font-size:9px;letter-spacing:0.25em;color:${genre.color};margin-bottom:14px;font-family:'Courier New',monospace;font-weight:700;">5-POINT SUMMARY</div>
          ${a.summary.map((line,i)=>`
            <div style="display:flex;gap:12px;margin-bottom:${i<4?'12px':'0'};align-items:flex-start;">
              <div style="width:20px;height:20px;border-radius:50%;background:${i===0?genre.color:`${genre.color}18`};color:${i===0?'#fff':genre.color};font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-family:'Courier New',monospace;">${i+1}</div>
              <div style="font-size:14px;line-height:1.65;color:${i===0?'#1a1610':'#6a6050'};">${line}</div>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
          ${a.tags.map(t=>`<span style="font-size:10px;color:${genre.color};background:${genre.color}12;padding:4px 10px;border-radius:2px;font-family:'Courier New',monospace;">#${t}</span>`).join('')}
        </div>
        <a href="${a.url}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:2px;padding:14px 16px;text-decoration:none;border:1px solid ${genre.color}33;">
          <div>
            <div style="font-size:9px;color:#b0a890;margin-bottom:3px;font-family:'Courier New',monospace;letter-spacing:0.1em;">元記事を確認する</div>
            <div style="font-size:12px;color:${genre.color};font-weight:600;">${a.source}</div>
          </div>
          <span style="font-size:18px;color:${genre.color};">↗</span>
        </a>
      </div>
    </div>
  `;
}

// ── ACTIONS ─────────────────────────────────────────────────────
window.toggleAll = () => {
  activeGenres = new Set(GENRES.map(g=>g.id));
  render();
};
window.toggleGenre = id => {
  if (activeGenres.has(id) && activeGenres.size === 1) return;
  activeGenres.has(id) ? activeGenres.delete(id) : activeGenres.add(id);
  render();
};
window.openDetail = id => {
  const sc = document.getElementById("scroll-content");
  if (sc) savedScroll = sc.scrollTop;
  selected = NEWS.find(a=>a.id===id);
  render();
};
window.closeDetail = () => {
  selected = null;
  render();
};

// ── INIT ────────────────────────────────────────────────────────
render();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
